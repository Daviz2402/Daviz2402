name: Generate Profile Visuals

on:
  schedule:
    - cron: "0 */12 * * *" # Cada 12 horas
  push:
    branches:
      - main
    paths:
      - 'config/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Crear carpeta de salida para ambos
      - name: Create output directory
        run: mkdir -p out_assets

      # 2. Generar Skill Tree
      - name: Generate SkillTree SVG
        uses: Daviz2402/SkillTree@main
        with:
          config-path: 'config/skills.json'
          output-path: 'out_assets/skill-tree.svg'

      # 3. Generar Pacman
      - name: Generate Pacman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Nota: Asegúrate que esta acción guarde el archivo en 'out_assets' 
          # o muévelo manualmente después de este paso.

      # Paso extra: Mover pacman si se genera en la raíz o en 'dist'
      - name: Move Pacman to output folder
        run: |
          if [ -f "pacman-contribution-graph.svg" ]; then mv pacman-contribution-graph.svg out_assets/; fi
          if [ -d "dist" ]; then cp -r dist/* out_assets/; fi

      # 4. Un solo despliegue para AMBOS archivos
      - name: Deploy both to Output Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out_assets
          branch: output
          clean: false # Mantiene archivos viejos si los hubiera
