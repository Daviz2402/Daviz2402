name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Se actualiza cada noche
  workflow_dispatch: # Permite ejecutarlo manualmente
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Daviz2402
          template: classic
          base: ""
          config_timezone: Europe/Madrid
          plugin_achievements: yes
          plugin_achievements_display: compact # Estilo medallas/trofeos
          plugin_achievements_threshold: C     # Muestra desde bronce en adelante
          filename: github-metrics.svg         # Nombre del archivo generado
